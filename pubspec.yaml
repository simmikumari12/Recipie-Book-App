name: recipe_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.0 # For Gemini AI
  image_picker: ^1.1.2         # For Camera access
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/tikka.jpg
    - assets/images/ratatouille.jpg
    - assets/images/tacos.jpg
    - assets/images/bibimbap.jpg
    - assets/images/burger.jpg
    - assets/images/paneer_chilli.jpg
    - assets/images/mix_fried_rice.jpg
